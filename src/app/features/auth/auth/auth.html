<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg auth-card p-4">
    <h3 class="text-center mb-4">
      {{ isLoginMode ? 'Login' : 'Register' }}
    </h3>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-danger text-center">
      {{ errorMessage }}
    </div>

    <!-- ================= LOGIN FORM ================= -->
    <form *ngIf="isLoginMode" [formGroup]="loginForm" (ngSubmit)="submitLogin()">
      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter email"
        />

        <small
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          class="text-danger"
        >
          Valid email is required
        </small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter password"
        />

        <small
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          class="text-danger"
        >
          Password is required
        </small>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <div class="text-center mt-3">
        <small>
          Don't have an account?
          <a href="javascript:void(0)" (click)="toggleMode()">Register</a>
        </small>
      </div>
    </form>

    <!-- ================= REGISTER FORM ================= -->
    <form *ngIf="!isLoginMode" [formGroup]="registerForm" (ngSubmit)="submitRegister()">
      <!-- Full Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input
          type="text"
          class="form-control"
          formControlName="fullname"
          placeholder="Enter full name"
        />

        <small
          *ngIf="registerForm.get('fullname')?.touched && registerForm.get('fullname')?.invalid"
          class="text-danger"
        >
          Full name is required
        </small>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="Enter email"
        />

        <small
          *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
          class="text-danger"
        >
          Valid email is required
        </small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter password"
        />

        <small
          *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
          class="text-danger"
        >
          Password is required
        </small>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        {{ loading ? 'Registering...' : 'Register' }}
      </button>

      <div class="text-center mt-3">
        <small>
          Already have an account?
          <a href="javascript:void(0)" (click)="toggleMode()">Login</a>
        </small>
      </div>
    </form>
  </div>
</div>
